<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事件详情 - WaveUP Sentinel</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-primary: #1a73e8;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #d3e3fd;
            --md-sys-color-secondary: #34a853;
            --md-sys-color-tertiary: #fbbc04;
            --md-sys-color-error: #ea4335;
            --md-sys-color-background: #f8f9fa;
            --md-sys-color-surface: #ffffff;
            --md-sys-color-on-surface: #202124;
            --md-sys-color-on-surface-variant: #5f6368;
            --md-sys-color-outline: #dadce0;
            --md-sys-color-outline-variant: #f1f3f4;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            background: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            line-height: 1.6;
        }
        
        /* 顶部应用栏 */
        .top-app-bar {
            background: var(--md-sys-color-surface);
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .top-app-bar-leading { display: flex; align-items: center; gap: 16px; }
        .top-app-bar-title {
            font-family: 'Google Sans', sans-serif;
            font-size: 20px;
            font-weight: 500;
        }
        
        .md-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: 'Google Sans', sans-serif;
            text-decoration: none;
        }
        .md-button-tonal {
            background: var(--md-sys-color-primary-container);
            color: #1967d2;
        }
        .md-button-tonal:hover { background: #bfe0fc; }
        .md-button-icon {
            width: 40px; height: 40px;
            padding: 0;
            justify-content: center;
            background: transparent;
            color: var(--md-sys-color-on-surface-variant);
            border-radius: 50%;
        }
        .md-button-icon:hover { background: rgba(95, 99, 104, 0.08); }
        
        /* 主容器 */
        .main-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px;
        }
        
        /* 卡片 */
        .md-card {
            background: var(--md-sys-color-surface);
            border-radius: 16px;
            box-shadow: 0 1px 2px rgba(60,64,67,0.3);
            overflow: hidden;
            margin-bottom: 24px;
        }
        .md-card-content { padding: 24px; }
        
        /* 事件头部 */
        .event-header {
            margin-bottom: 24px;
        }
        .event-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--md-sys-color-primary-container);
            color: #1967d2;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
        }
        .event-title {
            font-family: 'Google Sans', sans-serif;
            font-size: 24px;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 16px;
        }
        
        /* 情感指示器 */
        .sentiment-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .sentiment-positive {
            background: #e6f4ea;
            color: var(--md-sys-color-secondary);
        }
        .sentiment-neutral {
            background: #f1f3f4;
            color: var(--md-sys-color-on-surface-variant);
        }
        .sentiment-negative {
            background: #fce8e6;
            color: var(--md-sys-color-error);
        }
        
        /* 事件内容 */
        .event-content {
            font-size: 16px;
            line-height: 1.8;
            color: var(--md-sys-color-on-surface);
            margin-bottom: 24px;
        }
        
        /* 统计信息 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-item {
            text-align: center;
            padding: 16px;
            background: var(--md-sys-color-background);
            border-radius: 12px;
        }
        .stat-value {
            font-family: 'Google Sans', sans-serif;
            font-size: 28px;
            font-weight: 500;
            color: var(--md-sys-color-primary);
        }
        .stat-label {
            font-size: 13px;
            color: var(--md-sys-color-on-surface-variant);
            margin-top: 4px;
        }
        
        /* 来源信息 */
        .source-info {
            padding: 20px;
            background: var(--md-sys-color-background);
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .source-info-label {
            font-size: 13px;
            color: var(--md-sys-color-on-surface-variant);
            margin-bottom: 8px;
        }
        .source-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--md-sys-color-primary);
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            background: var(--md-sys-color-primary-container);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .source-link:hover {
            background: #bfe0fc;
        }
        
        /* 相关事件 */
        .related-events {
            margin-top: 32px;
        }
        .related-title {
            font-family: 'Google Sans', sans-serif;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .related-list {
            list-style: none;
        }
        .related-item {
            padding: 16px;
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
            cursor: pointer;
            transition: background 0.2s;
        }
        .related-item:hover {
            background: var(--md-sys-color-background);
        }
        .related-item:last-child {
            border-bottom: none;
        }
        .related-item-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .related-item-meta {
            font-size: 12px;
            color: var(--md-sys-color-on-surface-variant);
        }
        
        /* 底部操作栏 */
        .bottom-actions {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--md-sys-color-surface);
            border-top: 1px solid var(--md-sys-color-outline-variant);
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        @media (max-width: 768px) {
            .main-container { padding: 16px; }
            .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .stat-item { padding: 12px 8px; }
            .stat-value { font-size: 22px; }
            .event-title { font-size: 20px; }
        }
    </style>
</head>
<body>
    <!-- 顶部应用栏 -->
    <header class="top-app-bar">
        <div class="top-app-bar-leading">
            <button class="md-button md-button-icon" onclick="goBack()">
                <span class="material-icons-round">arrow_back</span>
            </button>
            <h1 class="top-app-bar-title">事件详情</h1>
        </div>
        <div class="top-app-bar-trailing">
            <button class="md-button md-button-tonal" onclick="shareEvent()">
                <span class="material-icons-round">share</span>
                <span>分享</span>
            </button>
        </div>
    </header>

    <!-- 主容器 -->
    <main class="main-container" style="margin-top: 64px;">
        <!-- 事件卡片 -->
        <div class="md-card">
            <div class="md-card-content">
                <div class="event-header">
                    <div class="event-meta" id="eventMeta">
                        <!-- 动态加载 -->
                    </div>
                    <div class="sentiment-badge" id="sentimentBadge">
                        <!-- 动态加载 -->
                    </div>
                    <h1 class="event-title" id="eventTitle">
                        <!-- 动态加载 -->
                    </h1>
                </div>

                <div class="stats-row" id="statsRow">
                    <div class="stat-item">
                        <div class="stat-value" id="likesCount">-</div>
                        <div class="stat-label">点赞</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="commentsCount">-</div>
                        <div class="stat-label">评论</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="sharesCount">-</div>
                        <div class="stat-label">转发</div>
                    </div>
                </div>

                <div class="event-content" id="eventContent">
                    <!-- 动态加载 -->
                </div>

                <div class="source-info">
                    <div class="source-info-label">信息来源</div>
                    <a href="#" class="source-link" id="sourceLink" target="_blank">
                        <span class="material-icons-round">open_in_new</span>
                        <span>查看原文</span>
                    </a>
                </div>
            </div>
        </div>

        <!-- 相关事件 -->
        <div class="md-card related-events">
            <div class="md-card-content">
                <h2 class="related-title">相关事件</h2>
                <ul class="related-list" id="relatedList">
                    <!-- 动态加载 -->
                </ul>
            </div>
        </div>
    </main>

    <script>
        let eventData = null;

        // 从 URL 获取事件 ID
        function getEventId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // 加载事件详情
        async function loadEventDetail() {
            const eventId = getEventId();
            if (!eventId) {
                window.location.href = '/';
                return;
            }

            try {
                const res = await fetch(`/api/v1/monitoring/feed?limit=50`);
                const result = await res.json();
                const event = result.data.find(e => e.id == eventId);

                if (!event) {
                    window.location.href = '/';
                    return;
                }

                eventData = event;
                renderEvent(event);
                renderRelated(event);
            } catch (error) {
                console.error('加载失败:', error);
                // 使用模拟数据
                const mockEvent = generateMockEvent();
                eventData = mockEvent;
                renderEvent(mockEvent);
            }
        }

        function generateMockEvent() {
            return {
                id: 1,
                content: "WaveUP 发布新款数字藏品平台，用户反响热烈，首日注册用户突破 10 万",
                source: "微博",
                sentiment: "positive",
                sentiment_score: 0.85,
                author: "WaveUP 官方",
                timestamp: new Date().toISOString(),
                likes: 1247,
                comments: 356,
                shares: 189,
                source_url: "https://weibo.com",
                summary: "WaveUP 今日正式发布新一代数字藏品平台，集成 AI 创作、智能合约、跨链交易等功能。平台上线首日即吸引超过 10 万用户注册，首批数字藏品在 30 分钟内售罄。"
            };
        }

        function renderEvent(event) {
            // 元数据
            document.getElementById('eventMeta').innerHTML = `
                <div class="meta-chip">
                    <span class="material-icons-round" style="font-size: 16px;">public</span>
                    ${event.source}
                </div>
                <div class="meta-chip">
                    <span class="material-icons-round" style="font-size: 16px;">person</span>
                    ${event.author || '匿名用户'}
                </div>
                <div class="meta-chip">
                    <span class="material-icons-round" style="font-size: 16px;">schedule</span>
                    ${formatTime(new Date(event.timestamp))}
                </div>
            `;

            // 情感标签
            const sentimentMap = {
                positive: { label: '正面', class: 'sentiment-positive', icon: 'sentiment_satisfied' },
                neutral: { label: '中性', class: 'sentiment-neutral', icon: 'sentiment_neutral' },
                negative: { label: '负面', class: 'sentiment-negative', icon: 'sentiment_dissatisfied' }
            };
            const sentiment = sentimentMap[event.sentiment] || sentimentMap.neutral;
            document.getElementById('sentimentBadge').className = `sentiment-badge ${sentiment.class}`;
            document.getElementById('sentimentBadge').innerHTML = `
                <span class="material-icons-round">${sentiment.icon}</span>
                <span>${sentiment.label} (${(event.sentiment_score * 100).toFixed(0)}分)</span>
            `;

            // 标题
            document.getElementById('eventTitle').textContent = event.content;

            // 统计
            document.getElementById('likesCount').textContent = (event.likes || 0).toLocaleString();
            document.getElementById('commentsCount').textContent = (event.comments || 0).toLocaleString();
            document.getElementById('sharesCount').textContent = (event.shares || 0).toLocaleString();

            // 内容
            document.getElementById('eventContent').innerHTML = `
                <p>${event.summary || event.content}</p>
                ${event.content.length > 100 ? `<p style="margin-top: 16px; color: var(--md-sys-color-on-surface-variant);">这是该事件的详细内容。点击下方"查看原文"按钮可以访问完整信息来源。</p>` : ''}
            `;

            // 来源链接
            const sourceLink = document.getElementById('sourceLink');
            if (event.source_url) {
                sourceLink.href = event.source_url;
                sourceLink.style.display = 'inline-flex';
            } else {
                sourceLink.style.display = 'none';
            }
        }

        function renderRelated(event) {
            const related = [
                { title: "数字藏品市场持续增长，WaveUP 领跑行业", source: "知乎", time: "2 小时前" },
                { title: "NFT 交易平台对比：WaveUP vs 竞品分析", source: "小红书", time: "5 小时前" },
                { title: "文化 IP 数字化转型趋势报告", source: "微信公众号", time: "昨天" }
            ];

            document.getElementById('relatedList').innerHTML = related.map(item => `
                <li class="related-item">
                    <div class="related-item-title">${item.title}</div>
                    <div class="related-item-meta">${item.source} · ${item.time}</div>
                </li>
            `).join('');
        }

        function goBack() {
            window.history.back();
        }

        function shareEvent() {
            if (navigator.share) {
                navigator.share({
                    title: eventData.content,
                    text: `来自 WaveUP Sentinel 的舆情播报`,
                    url: window.location.href
                });
            } else {
                alert('分享链接已复制到剪贴板');
            }
        }

        function formatTime(date) {
            const now = new Date();
            const diff = (now - date) / 1000;
            if (diff < 60) return '刚刚';
            if (diff < 3600) return `${Math.floor(diff / 60)}分钟前`;
            if (diff < 86400) return date.toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'});
            return date.toLocaleDateString('zh-CN', {year:'numeric', month:'short', day:'numeric'});
        }

        // 启动
        loadEventDetail();
    </script>
</body>
</html>
