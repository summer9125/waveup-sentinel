<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事件详情 - WaveUP Sentinel</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-primary: #1a73e8;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #d3e3fd;
            --md-sys-color-secondary: #34a853;
            --md-sys-color-tertiary: #fbbc04;
            --md-sys-color-error: #ea4335;
            --md-sys-color-background: #f8f9fa;
            --md-sys-color-surface: #ffffff;
            --md-sys-color-on-surface: #202124;
            --md-sys-color-on-surface-variant: #5f6368;
            --md-sys-color-outline: #dadce0;
            --md-sys-color-outline-variant: #f1f3f4;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            background: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            line-height: 1.6;
        }
        
        .top-app-bar {
            background: var(--md-sys-color-surface);
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
            padding: 0 16px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .top-app-bar-leading { display: flex; align-items: center; gap: 12px; }
        .top-app-bar-title {
            font-family: 'Google Sans', sans-serif;
            font-size: 18px;
            font-weight: 500;
        }
        
        .md-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: 'Google Sans', sans-serif;
            text-decoration: none;
        }
        .md-button-tonal {
            background: var(--md-sys-color-primary-container);
            color: #1967d2;
        }
        .md-button-tonal:hover { background: #bfe0fc; }
        .md-button-icon {
            width: 40px; height: 40px;
            padding: 0;
            justify-content: center;
            background: transparent;
            color: var(--md-sys-color-on-surface-variant);
            border-radius: 50%;
        }
        .md-button-icon:hover { background: rgba(95, 99, 104, 0.08); }
        
        .main-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 80px;
        }
        
        .md-card {
            background: var(--md-sys-color-surface);
            border-radius: 16px;
            box-shadow: 0 1px 3px rgba(60,64,67,0.3);
            overflow: hidden;
            margin-bottom: 16px;
        }
        .md-card-content { padding: 20px; }
        
        .event-header { margin-bottom: 20px; }
        .event-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--md-sys-color-primary-container);
            color: #1967d2;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
        }
        .event-title {
            font-family: 'Google Sans', sans-serif;
            font-size: 22px;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 16px;
        }
        
        .sentiment-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .sentiment-positive { background: #e6f4ea; color: var(--md-sys-color-secondary); }
        .sentiment-neutral { background: #f1f3f4; color: var(--md-sys-color-on-surface-variant); }
        .sentiment-negative { background: #fce8e6; color: var(--md-sys-color-error); }
        
        .event-content {
            font-size: 15px;
            line-height: 1.8;
            color: var(--md-sys-color-on-surface);
            margin-bottom: 24px;
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-item {
            text-align: center;
            padding: 16px;
            background: var(--md-sys-color-background);
            border-radius: 12px;
        }
        .stat-value {
            font-family: 'Google Sans', sans-serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--md-sys-color-primary);
        }
        .stat-label {
            font-size: 12px;
            color: var(--md-sys-color-on-surface-variant);
            margin-top: 4px;
        }
        
        .source-info {
            padding: 20px;
            background: var(--md-sys-color-background);
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .source-info-label {
            font-size: 13px;
            color: var(--md-sys-color-on-surface-variant);
            margin-bottom: 12px;
        }
        .source-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--md-sys-color-primary);
            text-decoration: none;
            font-weight: 500;
            padding: 10px 20px;
            background: var(--md-sys-color-primary-container);
            border-radius: 10px;
            transition: all 0.2s;
        }
        .source-link:hover { background: #bfe0fc; }
        
        .tag-section {
            margin-top: 24px;
        }
        .tag-section-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
        }
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .related-events { margin-top: 32px; }
        .related-title {
            font-family: 'Google Sans', sans-serif;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .related-list { list-style: none; }
        .related-item {
            padding: 16px;
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
            cursor: pointer;
            transition: background 0.2s;
        }
        .related-item:hover { background: var(--md-sys-color-background); }
        .related-item:last-child { border-bottom: none; }
        .related-item-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .related-item-meta {
            font-size: 12px;
            color: var(--md-sys-color-on-surface-variant);
        }
        
        @media (max-width: 768px) {
            .main-container { padding: 16px; }
            .event-title { font-size: 18px; }
            .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .stat-item { padding: 12px 8px; }
            .stat-value { font-size: 20px; }
        }
    </style>
</head>
<body>
    <header class="top-app-bar">
        <div class="top-app-bar-leading">
            <button class="md-button md-button-icon" onclick="goBack()">
                <span class="material-icons-round">arrow_back</span>
            </button>
            <h1 class="top-app-bar-title">事件详情</h1>
        </div>
        <div class="top-app-bar-trailing">
            <button class="md-button md-button-tonal" onclick="shareEvent()">
                <span class="material-icons-round">share</span>
            </button>
        </div>
    </header>

    <main class="main-container">
        <div class="md-card">
            <div class="md-card-content">
                <div class="event-header">
                    <div class="event-meta" id="eventMeta"></div>
                    <div class="sentiment-badge" id="sentimentBadge"></div>
                    <h1 class="event-title" id="eventTitle"></h1>
                </div>

                <div class="stats-row" id="statsRow">
                    <div class="stat-item">
                        <div class="stat-value" id="likesCount">-</div>
                        <div class="stat-label">点赞</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="commentsCount">-</div>
                        <div class="stat-label">评论</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="sharesCount">-</div>
                        <div class="stat-label">转发</div>
                    </div>
                </div>

                <div class="event-content" id="eventContent"></div>

                <div class="source-info">
                    <div class="source-info-label">信息来源</div>
                    <a href="#" class="source-link" id="sourceLink" target="_blank">
                        <span class="material-icons-round">open_in_new</span>
                        <span>查看原文</span>
                    </a>
                </div>

                <div class="tag-section">
                    <div class="tag-section-title">标签</div>
                    <div class="tag-list" id="tagList"></div>
                </div>
            </div>
        </div>

        <div class="md-card related-events">
            <div class="md-card-content">
                <h2 class="related-title">相关事件</h2>
                <ul class="related-list" id="relatedList"></ul>
            </div>
        </div>
    </main>

    <script>
        // 从 URL 获取事件 ID
        function getEventId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // 生成详细的模拟数据
        function generateEventDetail(id) {
            const categories = ["公司动态", "产品发布", "用户反馈", "行业资讯", "竞品分析"];
            const industries = ["数字藏品", "NFT", "元宇宙", "文化 IP"];
            const channels = ["微博", "知乎", "小红书", "36Kr", "虎嗅"];
            
            const category = categories[Math.floor(Math.random() * categories.length)];
            const industry = industries[Math.floor(Math.random() * industries.length)];
            const channel = channels[Math.floor(Math.random() * channels.length)];
            
            const titles = {
                "公司动态": `WaveUP 宣布完成新一轮融资，加速数字藏品平台布局`,
                "产品发布": `WaveUP 发布 AI 创作工具，降低数字藏品创作门槛`,
                "用户反馈": `WaveUP 用户突破 100 万，社区活跃度持续攀升`,
                "行业资讯": `数字藏品市场回暖，WaveUP 等平台领涨行业`,
                "竞品分析": `数字藏品平台竞争加剧，WaveUP 凭借技术创新领先`
            };

            const summaries = {
                "公司动态": `WaveUP 今日宣布完成 B 轮融资，由知名投资机构领投，融资金额达数千万美元。WaveUP 创始人表示，本轮融资将用于技术研发、市场拓展和团队建设，进一步巩固在数字藏品领域的领先地位。`,
                "产品发布": `WaveUP 正式发布 AI 创作工具，支持一键生成数字藏品，大幅降低创作门槛。该工具集成了最新的 AIGC 技术，用户只需输入简单描述，即可生成高质量的数字艺术作品。上线首日即吸引超过 10 万用户体验。`,
                "用户反馈": `WaveUP 平台注册用户突破 100 万大关，日活跃用户达到 20 万。用户满意度调查显示，90% 的用户对平台功能表示满意，85% 的用户愿意向朋友推荐。社区讨论热度持续攀升，优质内容不断涌现。`,
                "行业资讯": `2026 年 Q1 数字藏品市场交易额环比增长 45%，市场呈现明显回暖迹象。WaveUP、鲸探等头部平台领涨，单月交易额突破 10 亿元。行业分析师认为，随着监管政策逐步明朗，数字藏品市场将迎来新一轮增长。`,
                "竞品分析": `国内数字藏品平台竞争日趋激烈，WaveUP 凭借技术创新和优质内容保持领先。数据显示，WaveUP 市场份额达到 35%，位居行业第一。主要竞争对手包括鲸探、幻核等，各家平台纷纷推出创新功能吸引用户。`
            };

            return {
                id: id,
                title: titles[category],
                summary: summaries[category],
                content: summaries[category] + `\n\n据悉，${industry}领域近年来发展迅速，市场规模持续扩大。WaveUP 作为行业领军企业，将继续加大研发投入，推动行业健康发展。\n\n业内专家认为，随着 5G、区块链等技术的成熟，${industry}将迎来更广阔的发展空间。WaveUP 的成功经验值得行业借鉴。`,
                source: channel,
                source_url: `https://${channel.toLowerCase().replace('站', '')}.com`,
                category: category,
                industry: industry,
                tags: [category, industry, "WaveUP", "数字藏品"],
                sentiment: "positive",
                sentiment_score: 0.82,
                author: `${channel}记者`,
                timestamp: new Date(Date.now() - Math.random() * 86400000).toISOString(),
                likes: Math.floor(Math.random() * 5000) + 1000,
                comments: Math.floor(Math.random() * 1000) + 100,
                shares: Math.floor(Math.random() * 500) + 50,
                is_verified: true
            };
        }

        // 加载事件详情
        function loadEventDetail() {
            const eventId = getEventId();
            if (!eventId) {
                alert('缺少事件 ID');
                window.location.href = '/';
                return;
            }

            const event = generateEventDetail(eventId);
            renderEvent(event);
            renderRelated(event);
        }

        function renderEvent(event) {
            // 元数据
            document.getElementById('eventMeta').innerHTML = `
                <div class="meta-chip">
                    <span class="material-icons-round" style="font-size: 16px;">public</span>
                    ${event.source}
                </div>
                <div class="meta-chip">
                    <span class="material-icons-round" style="font-size: 16px;">category</span>
                    ${event.category}
                </div>
                <div class="meta-chip">
                    <span class="material-icons-round" style="font-size: 16px;">schedule</span>
                    ${formatTime(new Date(event.timestamp))}
                </div>
            `;

            // 情感标签
            const sentimentMap = {
                positive: { label: '正面', class: 'sentiment-positive', icon: 'sentiment_satisfied' },
                neutral: { label: '中性', class: 'sentiment-neutral', icon: 'sentiment_neutral' },
                negative: { label: '负面', class: 'sentiment-negative', icon: 'sentiment_dissatisfied' }
            };
            const s = sentimentMap[event.sentiment];
            document.getElementById('sentimentBadge').className = `sentiment-badge ${s.class}`;
            document.getElementById('sentimentBadge').innerHTML = `
                <span class="material-icons-round">${s.icon}</span>
                <span>${s.label} (${(event.sentiment_score * 100).toFixed(0)}分)</span>
            `;

            // 标题
            document.getElementById('eventTitle').textContent = event.title;

            // 统计
            document.getElementById('likesCount').textContent = event.likes.toLocaleString();
            document.getElementById('commentsCount').textContent = event.comments.toLocaleString();
            document.getElementById('sharesCount').textContent = event.shares.toLocaleString();

            // 内容
            document.getElementById('eventContent').innerHTML = event.content.split('\n\n').map(p => 
                `<p style="margin-bottom: 16px;">${p}</p>`
            ).join('');

            // 来源链接
            document.getElementById('sourceLink').href = event.source_url;

            // 标签
            document.getElementById('tagList').innerHTML = event.tags.map(tag => 
                `<span style="padding: 6px 12px; background: var(--md-sys-color-primary-container); color: #1967d2; border-radius: 12px; font-size: 12px; font-weight: 500;">${tag}</span>`
            ).join('');
        }

        function renderRelated(event) {
            const related = [
                { title: "WaveUP 数字藏品平台功能全面解析", source: "知乎", time: "2 小时前" },
                { title: "数字藏品市场趋势报告 2026", source: "36Kr", time: "5 小时前" },
                { title: "NFT 交易平台横向对比评测", source: "虎嗅", time: "昨天" }
            ];

            document.getElementById('relatedList').innerHTML = related.map(item => `
                <li class="related-item">
                    <div class="related-item-title">${item.title}</div>
                    <div class="related-item-meta">${item.source} · ${item.time}</div>
                </li>
            `).join('');
        }

        function goBack() {
            window.history.back();
        }

        function shareEvent() {
            if (navigator.share) {
                navigator.share({
                    title: document.getElementById('eventTitle').textContent,
                    text: '来自 WaveUP Sentinel 的舆情播报',
                    url: window.location.href
                });
            } else {
                alert('链接已复制');
            }
        }

        function formatTime(date) {
            const now = new Date();
            const diff = (now - date) / 1000;
            if (diff < 60) return '刚刚';
            if (diff < 3600) return `${Math.floor(diff / 60)}分钟前`;
            if (diff < 86400) return date.toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'});
            return date.toLocaleDateString('zh-CN', {month:'short', day:'numeric'});
        }

        // 启动
        loadEventDetail();
    </script>
</body>
</html>
