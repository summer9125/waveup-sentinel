<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaveUP Sentinel - 舆情监督系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-primary: #1a73e8;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #d3e3fd;
            --md-sys-color-secondary: #34a853;
            --md-sys-color-tertiary: #fbbc04;
            --md-sys-color-error: #ea4335;
            --md-sys-color-background: #f8f9fa;
            --md-sys-color-surface: #ffffff;
            --md-sys-color-on-surface: #202124;
            --md-sys-color-on-surface-variant: #5f6368;
            --md-sys-color-outline: #dadce0;
            --md-sys-color-outline-variant: #f1f3f4;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            background: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            line-height: 1.5;
        }
        
        /* 顶部应用栏 */
        .top-app-bar {
            background: var(--md-sys-color-surface);
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .top-app-bar-leading { display: flex; align-items: center; gap: 16px; }
        .top-app-bar-title {
            font-family: 'Google Sans', sans-serif;
            font-size: 22px;
            font-weight: 500;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #1a73e8, #4285f4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }
        
        .top-app-bar-trailing { display: flex; align-items: center; gap: 8px; }
        
        /* 按钮 */
        .md-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: 'Google Sans', sans-serif;
        }
        .md-button-filled {
            background: var(--md-sys-color-primary);
            color: white;
        }
        .md-button-filled:hover {
            box-shadow: 0 2px 6px rgba(26, 115, 232, 0.3);
            background: #1557b0;
        }
        .md-button-tonal {
            background: var(--md-sys-color-primary-container);
            color: #1967d2;
        }
        .md-button-icon {
            width: 40px; height: 40px;
            padding: 0;
            justify-content: center;
            background: transparent;
            color: var(--md-sys-color-on-surface-variant);
            border-radius: 50%;
        }
        .md-button-icon:hover { background: rgba(95, 99, 104, 0.08); }
        
        /* 主容器 */
        .main-container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }
        @media (min-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr 400px;
            }
        }
        
        /* 卡片 */
        .md-card {
            background: var(--md-sys-color-surface);
            border-radius: 16px;
            box-shadow: 0 1px 2px rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
            overflow: hidden;
        }
        .md-card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .md-card-title {
            font-family: 'Google Sans', sans-serif;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .md-card-content { padding: 24px; }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--md-sys-color-surface);
            border-radius: 16px;
            box-shadow: 0 1px 2px rgba(60,64,67,0.3);
            padding: 24px;
        }
        .stat-card-label {
            font-size: 13px;
            color: var(--md-sys-color-on-surface-variant);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card-value {
            font-family: 'Google Sans', sans-serif;
            font-size: 32px;
            font-weight: 500;
        }
        .stat-card-trend {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            font-size: 13px;
        }
        .trend-up { color: var(--md-sys-color-secondary); }
        .trend-down { color: var(--md-sys-color-error); }
        
        /* 实时播报时间轴 - 金十数据风格 */
        .live-timeline {
            position: relative;
            padding-left: 20px;
        }
        .live-timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--md-sys-color-primary) 0%, var(--md-sys-color-outline) 100%);
        }
        .timeline-item {
            position: relative;
            padding-left: 24px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -16px;
            top: 6px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--md-sys-color-surface);
            border: 3px solid var(--md-sys-color-primary);
            z-index: 1;
        }
        .timeline-item.important::before {
            border-color: var(--md-sys-color-error);
            background: #fce8e6;
        }
        .timeline-item-time {
            font-size: 12px;
            color: var(--md-sys-color-on-surface-variant);
            font-family: 'Roboto Mono', monospace;
            margin-bottom: 6px;
        }
        .timeline-item-content {
            background: var(--md-sys-color-surface);
            border: 1px solid var(--md-sys-color-outline-variant);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.2s;
        }
        .timeline-item-content:hover {
            border-color: var(--md-sys-color-primary);
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.15);
        }
        .timeline-item-content.important {
            border-left: 3px solid var(--md-sys-color-error);
            background: #fef7e0;
        }
        .timeline-item-text {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .timeline-item-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: var(--md-sys-color-on-surface-variant);
        }
        .timeline-item-source {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            background: var(--md-sys-color-primary-container);
            color: #1967d2;
            border-radius: 4px;
            font-weight: 500;
        }
        .timeline-item-sentiment {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .sentiment-positive { color: var(--md-sys-color-secondary); }
        .sentiment-negative { color: var(--md-sys-color-error); }
        .sentiment-neutral { color: var(--md-sys-color-on-surface-variant); }
        
        /* 直播标记 */
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: #fce8e6;
            color: var(--md-sys-color-error);
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
        }
        .live-dot {
            width: 6px;
            height: 6px;
            background: var(--md-sys-color-error);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        /* 筛选器 */
        .filter-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .md-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid var(--md-sys-color-outline);
            background: var(--md-sys-color-surface);
            cursor: pointer;
            transition: all 0.2s;
        }
        .md-chip:hover {
            background: var(--md-sys-color-outline-variant);
        }
        .md-chip.active {
            background: var(--md-sys-color-primary);
            color: white;
            border-color: var(--md-sys-color-primary);
        }
        
        /* 右侧面板 */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        /* 预警卡片 */
        .alert-item {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: #fef7e0;
            border: 1px solid #feefc3;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .alert-item:last-child { margin-bottom: 0; }
        .alert-item.high {
            background: #fce8e6;
            border-color: #f5c6cb;
        }
        .alert-icon {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .alert-item.high .alert-icon { background: #f5c6cb; color: var(--md-sys-color-error); }
        .alert-item.medium .alert-icon { background: #feefc3; color: #b06000; }
        .alert-content { flex: 1; }
        .alert-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .alert-time {
            font-size: 12px;
            color: var(--md-sys-color-on-surface-variant);
        }
        
        /* 话题标签 */
        .topic-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .topic-tag {
            padding: 6px 14px;
            background: var(--md-sys-color-primary-container);
            color: #1967d2;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
        }
        
        /* 加载更多 */
        .load-more {
            display: block;
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 12px;
            color: var(--md-sys-color-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .load-more:hover {
            background: var(--md-sys-color-primary-container);
            border-color: var(--md-sys-color-primary);
        }
        
        /* 底部导航（移动端） */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--md-sys-color-surface);
            border-top: 1px solid var(--md-sys-color-outline-variant);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            display: none;
        }
        @media (max-width: 768px) {
            .bottom-nav { display: flex; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .main-container { padding-bottom: 80px; }
        }
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--md-sys-color-on-surface-variant);
            font-size: 12px;
        }
        .bottom-nav-item.active {
            color: var(--md-sys-color-primary);
            background: var(--md-sys-color-primary-container);
        }
    </style>
</head>
<body>
    <!-- 顶部应用栏 -->
    <header class="top-app-bar">
        <div class="top-app-bar-leading">
            <div class="logo-icon">📊</div>
            <h1 class="top-app-bar-title">WaveUP Sentinel</h1>
        </div>
        <div class="top-app-bar-trailing">
            <div class="live-badge">
                <span class="live-dot"></span>
                <span>直播中</span>
            </div>
            <button class="md-button md-button-icon" onclick="refreshData()">
                <span class="material-icons-round">refresh</span>
            </button>
        </div>
    </header>

    <!-- 主容器 -->
    <main class="main-container">
        <!-- 左侧：实时播报 -->
        <div class="md-card">
            <div class="md-card-header">
                <div class="md-card-title">
                    <span class="material-icons-round">campaign</span>
                    实时舆情播报
                </div>
                <div class="filter-chips" id="filterChips">
                    <div class="md-chip active" data-filter="all">全部</div>
                    <div class="md-chip" data-filter="important">重要</div>
                    <div class="md-chip" data-filter="positive">正面</div>
                    <div class="md-chip" data-filter="negative">负面</div>
                </div>
            </div>
            <div class="md-card-content">
                <div class="live-timeline" id="liveTimeline">
                    <div class="loading-skeleton" style="height: 100px;"></div>
                </div>
                <button class="load-more" onclick="loadMore()">加载更多</button>
            </div>
        </div>

        <!-- 右侧：统计和预警 -->
        <div class="side-panel">
            <!-- 统计概览 -->
            <div class="md-card">
                <div class="md-card-header">
                    <div class="md-card-title">
                        <span class="material-icons-round">insights</span>
                        数据概览
                    </div>
                </div>
                <div class="md-card-content">
                    <div class="stats-grid" style="grid-template-columns: repeat(2, 1fr); gap: 12px;">
                        <div class="stat-card" style="padding: 16px;">
                            <div class="stat-card-label">总声量</div>
                            <div class="stat-card-value" id="totalMentions" style="font-size: 24px;">-</div>
                            <div class="stat-card-trend trend-up">
                                <span class="material-icons-round" style="font-size: 14px;">trending_up</span>
                                <span id="trendValue">+15.3%</span>
                            </div>
                        </div>
                        <div class="stat-card" style="padding: 16px;">
                            <div class="stat-card-label">情感得分</div>
                            <div class="stat-card-value" id="sentimentScore" style="font-size: 24px;">-</div>
                        </div>
                        <div class="stat-card" style="padding: 16px;">
                            <div class="stat-card-label">预警</div>
                            <div class="stat-card-value" id="activeAlerts" style="font-size: 24px;">-</div>
                        </div>
                        <div class="stat-card" style="padding: 16px;">
                            <div class="stat-card-label">平台</div>
                            <div class="stat-card-value" style="font-size: 24px;">8</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 预警中心 -->
            <div class="md-card">
                <div class="md-card-header">
                    <div class="md-card-title">
                        <span class="material-icons-round">warning</span>
                        实时预警
                    </div>
                </div>
                <div class="md-card-content">
                    <div id="alertsContainer">
                        <div class="loading-skeleton" style="height: 80px;"></div>
                    </div>
                </div>
            </div>

            <!-- 热门话题 -->
            <div class="md-card">
                <div class="md-card-header">
                    <div class="md-card-title">
                        <span class="material-icons-round">whatshot</span>
                        热门话题
                    </div>
                </div>
                <div class="md-card-content">
                    <div class="topic-cloud" id="topicCloud">
                        <div class="loading-skeleton" style="height: 32px; width: 100px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <div class="bottom-nav-item active">
            <span class="material-icons-round">campaign</span>
            <span>播报</span>
        </div>
        <div class="bottom-nav-item">
            <span class="material-icons-round">insights</span>
            <span>分析</span>
        </div>
        <div class="bottom-nav-item">
            <span class="material-icons-round">warning</span>
            <span>预警</span>
        </div>
        <div class="bottom-nav-item">
            <span class="material-icons-round">description</span>
            <span>报告</span>
        </div>
    </nav>

    <script>
        let currentFilter = 'all';
        let timelineData = [];

        // 生成模拟数据
        function generateTimelineData() {
            const sources = [
                "微博", "知乎", "小红书", "抖音", "Twitter", "Discord", 
                "微信公众号", "百度贴吧", "今日头条", "B 站", "豆瓣", 
                "虎嗅", "36Kr", "界面新闻", "财新网", "TechCrunch",
                "The Verge", "CoinDesk", "Decrypt", "Telegram"
            ];
            const sentiments = ["positive", "neutral", "negative"];
            const contents = [
                "WaveUP 发布新款数字藏品平台，用户反响热烈，首日注册用户突破 10 万",
                "数字文化资产市场迎来新一轮增长，交易额环比上涨 35%",
                "NFT 交易量连续 3 天上涨，市场信心恢复，头部平台领涨",
                "用户对 WaveUP 新功能表示期待，社交媒体讨论热度攀升",
                "竞品平台发布类似功能，竞争加剧，行业洗牌加速",
                "行业专家分析数字藏品未来趋势，合规化成为关键词",
                "WaveUP 用户突破 100 万里程碑，成为行业领军者",
                "元宇宙概念持续升温，相关板块走强，资本大量涌入",
                "文化 IP 授权成为新风口，传统品牌加速数字化转型",
                "区块链技术在文化领域应用加速落地，政策支持力度加大",
                "Web3.0 浪潮下，数字藏品平台迎来发展机遇",
                "虚拟展览成为新趋势，博物馆纷纷入驻元宇宙",
                "数字版权保护技术取得突破，行业生态更加健康",
                "AI 生成内容引发热议，数字艺术边界再讨论",
                "跨境数字交易增长迅猛，全球化布局成必然趋势"
            ];
            
            const data = [];
            const now = Date.now();
            for (let i = 0; i < 30; i++) {
                const time = new Date(now - i * 180000); // 每 3 分钟一条
                const sentiment = sentiments[Math.floor(Math.random() * sentiments.length)];
                const isImportant = Math.random() > 0.8;
                const sourceUrl = generateSourceUrl(sources[Math.floor(Math.random() * sources.length)]);
                data.push({
                    id: i + 1,
                    time: time.toISOString(),
                    timeDisplay: formatTime(time),
                    content: contents[i % contents.length],
                    source: sources[Math.floor(Math.random() * sources.length)],
                    sentiment: sentiment,
                    important: isImportant,
                    likes: Math.floor(Math.random() * 5000),
                    comments: Math.floor(Math.random() * 1000),
                    shares: Math.floor(Math.random() * 500),
                    source_url: sourceUrl,
                    author: `user_${Math.floor(Math.random() * 10000)}`
                });
            }
            return data;
        }

        // 加载数据
        async function loadData() {
            try {
                const [overviewRes, feedRes, alertsRes, topicsRes] = await Promise.all([
                    fetch('/api/v1/monitoring/overview'),
                    fetch('/api/v1/monitoring/feed?limit=30'),
                    fetch('/api/v1/alerts/list?status=active&limit=3'),
                    fetch('/api/v1/monitoring/topics?limit=10')
                ]);

                const overview = await overviewRes.json();
                const feed = await feedRes.json();
                const alerts = await alertsRes.json();
                const topics = await topicsRes.json();

                timelineData = feed.data || generateTimelineData();
                updateStats(overview.data);
                updateTimeline(timelineData);
                updateAlerts(alerts.data);
                updateTopics(topics.data);
            } catch (error) {
                console.error('加载失败:', error);
                timelineData = generateTimelineData();
                updateTimeline(timelineData);
            }
        }

        function updateStats(data) {
            document.getElementById('totalMentions').textContent = (data?.waveup?.total_mentions || 1247).toLocaleString();
            document.getElementById('sentimentScore').textContent = (data?.waveup?.sentiment_score || 0.72).toFixed(2);
            document.getElementById('trendValue').textContent = `+${data?.waveup?.change_24h || 15.3}%`;
            document.getElementById('activeAlerts').textContent = "3";
        }

        function updateTimeline(data) {
            const container = document.getElementById('liveTimeline');
            const filtered = currentFilter === 'all' ? data :
                            currentFilter === 'important' ? data.filter(d => d.important) :
                            currentFilter === 'positive' ? data.filter(d => d.sentiment === 'positive') :
                            currentFilter === 'negative' ? data.filter(d => d.sentiment === 'negative') : data;
            
            container.innerHTML = filtered.slice(0, 20).map(item => `
                <div class="timeline-item ${item.important ? 'important' : ''}" onclick="viewDetail(${item.id})" style="cursor: pointer;">
                    <div class="timeline-item-time">${item.timeDisplay}</div>
                    <div class="timeline-item-content ${item.important ? 'important' : ''}">
                        <div class="timeline-item-text">${escapeHtml(item.content)}</div>
                        <div class="timeline-item-meta">
                            <span class="timeline-item-source">
                                <span class="material-icons-round" style="font-size: 14px;">public</span>
                                ${item.source}
                            </span>
                            <span class="timeline-item-sentiment ${getSentimentClass(item.sentiment)}">
                                <span class="material-icons-round" style="font-size: 14px;">
                                    ${item.sentiment === 'positive' ? 'sentiment_satisfied' : item.sentiment === 'negative' ? 'sentiment_dissatisfied' : 'sentiment_neutral'}
                                </span>
                                ${getSentimentLabel(item.sentiment)}
                            </span>
                            <span style="color: var(--md-sys-color-on-surface-variant);">
                                <span class="material-icons-round" style="font-size: 14px;">favorite</span>
                                ${(item.likes || 0).toLocaleString()}
                            </span>
                            ${item.important ? '<span style="color: var(--md-sys-color-error); font-weight: 500;">🔥 重要</span>' : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateAlerts(alerts) {
            const container = document.getElementById('alertsContainer');
            if (!alerts || alerts.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--md-sys-color-on-surface-variant); padding: 20px;">暂无预警</div>';
                return;
            }
            container.innerHTML = alerts.map(alert => `
                <div class="alert-item ${alert.level}">
                    <div class="alert-icon">
                        <span class="material-icons-round">warning</span>
                    </div>
                    <div class="alert-content">
                        <div class="alert-title">${escapeHtml(alert.title)}</div>
                        <div class="alert-time">${formatTime(new Date(alert.timestamp))}</div>
                    </div>
                </div>
            `).join('');
        }

        function updateTopics(topics) {
            const container = document.getElementById('topicCloud');
            if (!topics) return;
            container.innerHTML = topics.data.slice(0, 8).map(topic => `
                <div class="topic-tag">${escapeHtml(topic.keyword)}</div>
            `).join('');
        }

        function filterTimeline(filter) {
            currentFilter = filter;
            document.querySelectorAll('.md-chip').forEach(chip => {
                chip.classList.toggle('active', chip.dataset.filter === filter);
            });
            updateTimeline(timelineData);
        }

        function loadMore() {
            // 模拟加载更多
            const moreData = generateTimelineData().slice(20, 30);
            timelineData = [...timelineData, ...moreData];
            updateTimeline(timelineData);
        }

        function refreshData() {
            loadData();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(date) {
            const now = new Date();
            const diff = (now - date) / 1000;
            if (diff < 60) return '刚刚';
            if (diff < 3600) return `${Math.floor(diff / 60)}分钟前`;
            if (diff < 86400) return date.toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'});
            return date.toLocaleDateString('zh-CN', {month:'short', day:'numeric'});
        }

        function getSentimentClass(sentiment) {
            return `sentiment-${sentiment}`;
        }

        function getSentimentLabel(sentiment) {
            const map = { positive: '正面', neutral: '中性', negative: '负面' };
            return map[sentiment] || sentiment;
        }

        function viewDetail(id) {
            window.location.href = `/detail.html?id=${id}`;
        }

        function generateSourceUrl(source) {
            const urls = {
                '微博': 'https://weibo.com',
                '知乎': 'https://zhihu.com',
                '小红书': 'https://xiaohongshu.com',
                '抖音': 'https://douyin.com',
                'Twitter': 'https://twitter.com',
                'Discord': 'https://discord.com',
                '微信公众号': 'https://mp.weixin.qq.com',
                '百度贴吧': 'https://tieba.baidu.com',
                '今日头条': 'https://toutiao.com',
                'B 站': 'https://bilibili.com',
                '豆瓣': 'https://douban.com',
                '虎嗅': 'https://huxiu.com',
                '36Kr': 'https://36kr.com',
                '界面新闻': 'https://jiemian.com',
                '财新网': 'https://caixin.com',
                'TechCrunch': 'https://techcrunch.com',
                'The Verge': 'https://theverge.com',
                'CoinDesk': 'https://coindesk.com',
                'Decrypt': 'https://decrypt.co',
                'Telegram': 'https://telegram.org'
            };
            return urls[source] || 'https://example.com';
        }

        // 事件监听
        document.getElementById('filterChips').addEventListener('click', (e) => {
            const chip = e.target.closest('.md-chip');
            if (chip) filterTimeline(chip.dataset.filter);
        });

        // 启动
        loadData();
        setInterval(loadData, 60000); // 1 分钟刷新
    </script>
</body>
</html>
